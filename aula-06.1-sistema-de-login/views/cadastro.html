{% extends 'base.html' %}

{% block content %}

{% with massages = get_flashed_messages(with_categories=true) %}

{% for category, message in massages %}
    <div class="alert alert-{{ category }}">
        {{message}}

    </div>
{% endfor %}
{% endwith %}
<main>
    <div class="container">
        <div class="card mt-4">
            <div class="card-header">
                <h2>Cadastro de Usuário</h2>
            </div>
            <div class="card-body">
                <form action="{{url_for('cadastro')}}" method="POST">
                    <label>E-mail</label>
                    <input type="email" name="email" placeholder="Insira seu e-mail" class="form-control">
                    <label>Senha</label>
                    <input type="password" name="senha" placeholder="Insira sua senha" class="form-control">
                    <br>
                    <button type="submit" class="btn btn-danger btn-block">Cadastrar</button>
                </form>
            </div>
        </div>
    </div>
</main>

{% endblock content %}
