{% extends 'base.html' %}
{% block content %}
<!-- {% with massages = get_flashed_messages(with_categories=true) %}

{% for category, message in massages %} -->
    <div class="alert alert-{{ category }}">
        {{message}}

    </div>
{% endfor %}
{% endwith %}
<main>
<div class="container">
    <div class="card mt4">
        <div class="card-header">
            <h2>Login do Usuario</h2>
        </div>
        <div class="card-boby m-auto">
            <form action="{{url_for('login')}}" method="POST">
                <label for="">E-mail</label>
                <input type="email" name="email" placeholder="insira seu email" class="form-control">
                <label for="">Senha</label>
                <input type="senha" name="senha" placeholder="insira sua senha" class="form-control">
                <br>
                <button type="submit" class="btn btn-danger btn-block">Entrar</button>

            </form>
            <hr>
            <h6>Não possui conta? <a href="{{url_for('cadastro')}}">Cadastre-se!</a></h6>

        </div>
    </div>
</div>
</main>

{% endblock content %}
