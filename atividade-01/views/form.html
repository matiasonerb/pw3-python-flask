{% extends 'base.html' %}

{% block content %}
<main>
    <h2>Cadastrar Livro</h2>
    <hr>

    <form action="{{url_for('lista')}}" method="post">
  <label for="name">Título:</label>
  <input type="text" name="titulo" placeholder="Insira o nome do livro" class="form-control" required>
  <label for="name">Autor:</label>
  <input type="text" name="autor" placeholder="Insira o nome do autor do livro" class="form-control" required>
  <label for="name">Ano:</label>
  <input type="text" name="ano" placeholder="Insira o ano de lançamento do livro" class="form-control" required>
  <br>
  <input type="submit" value="Cadastrar" class="btn btn-success">
  <input type="reset" value="Limpar" class="btn btn-outline-danger">
</form>
</main>
{% endblock content %}
